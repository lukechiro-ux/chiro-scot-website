<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coaching — Chiro Scot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #1F2937;
        }
        
        header {
            background: #FFFFFF;
            border-bottom: 1px solid #E5E7EB;
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: #1F2937;
        }
        
        .logo svg {
            width: 40px;
            height: 40px;
        }
        
        .logo-text {
            font-size: 1.1rem;
            font-weight: 500;
        }
        
        nav {
            display: flex;
            gap: 2rem;
        }
        
        nav a {
            color: #1F2937;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        
        nav a:hover {
            color: #4F46E5;
        }
        
        .hero {
            background: linear-gradient(135deg, rgba(31, 41, 55, 0.6) 0%, rgba(31, 41, 55, 0.4) 100%), url('coaching_peaks.jpg') center/cover;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #FFFFFF;
        }
        
        .hero-content h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        
        .hero-content p {
            font-size: 1.1rem;
            color: #E5E7EB;
        }
        
        .section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }
        
        .section h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 3rem;
            text-align: center;
        }
        
        .section p {
            font-size: 1.05rem;
            color: #4B5563;
            line-height: 1.8;
            margin-bottom: 1.5rem;
        }
        
        .framework-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }
        
        .framework-card {
            padding: 2.5rem 2rem;
            background: #F9FAFB;
            border-radius: 8px;
            border-left: 4px solid #4F46E5;
        }
        
        .framework-card h3 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        
        .framework-card p {
            color: #6B7280;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        
        .core-principles {
            background: #F3F4F6;
            padding: 3rem 2rem;
            border-radius: 8px;
            margin-bottom: 4rem;
        }
        
        .core-principles h3 {
            font-size: 1.3rem;
            margin-bottom: 2rem;
            text-align: center;
            font-weight: 600;
        }
        
        .principles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 2rem;
        }
        
        .principle {
            text-align: center;
        }
        
        .principle-number {
            font-size: 2rem;
            font-weight: 700;
            color: #4F46E5;
            margin-bottom: 0.5rem;
        }
        
        .principle p {
            color: #6B7280;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        
        .cta-section {
            background: #4F46E5;
            color: #FFFFFF;
            padding: 4rem 2rem;
            text-align: center;
            border-radius: 8px;
            margin-top: 4rem;
        }
        
        .cta-section h3 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }
        
        .cta-section p {
