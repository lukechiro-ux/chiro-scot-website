<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Luke Brady — Chiro Scot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #1F2937;
        }
        
        header {
            background: #FFFFFF;
            border-bottom: 1px solid #E5E7EB;
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: #1F2937;
        }
        
        .logo svg {
            width: 40px;
            height: 40px;
        }
        
        .logo-text {
            font-size: 1.1rem;
            font-weight: 500;
        }
        
        nav {
            display: flex;
            gap: 2rem;
        }
        
        nav a {
            color: #1F2937;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        
        nav a:hover {
            color: #4F46E5;
        }
        
        .hero {
            background: linear-gradient(135deg, rgba(31, 41, 55, 0.6) 0%, rgba(31, 41, 55, 0.4) 100%), url('about_loch.jpg') center/cover;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #FFFFFF;
        }
        
        .hero-content h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        
        .section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }
        
        .section h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
        }
        
        .section p {
            font-size: 1.05rem;
            color: #4B5563;
            line-height: 1.8;
            margin-bottom: 1.5rem;
        }
        
        .credentials-section {
            background: #F3F4F6;
            padding: 3rem 2rem;
            border-radius: 8px;
            margin-bottom: 4rem;
            text-align: center;
        }
        
        .credentials-section h3 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }
        
        .credentials-section p {
            color: #6B7280;
            line-height: 1.8;
            font-size: 0.95rem;
            margin-bottom: 0.75rem;
        }
        
        .values-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }
        
        .value-card {
            padding: 2rem;
            background: #F9FAFB;
            border-radius: 8px;
            border-left: 4px solid #4F46E5;
        }
        
        .value-card h3 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        
        .value-card p {
            color: #6B7280;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        
        footer {
            background: #1F2937;
            color: #FFFFFF;
            padding: 3rem 2rem;
            text-align: center;
            border-top: 1px solid #374151;
        }
        
        footer p {
            opacity: 0.7;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }
        
        @media (max-width: 768px) {
            .hero-content h1 {
                font-size: 1.8rem;
            }
            
            nav {
                gap: 1rem;
            }
        }
    </style>
</head>
<body>

        <div class="header-container">
            <a href="index.html" class="logo">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 6 Q 21.5 11 20 16 Q 18.5 21 20 26 Q 21.5 31 20 36" stroke="#1F2937" stroke-width="2" stroke-linecap="round" fill="none"/>
                    <circle cx="20" cy="10" r="1.5" fill="#1F2937"/>
                    <circle cx="20" cy="20" r="1.5" fill="#1F2937"/>
                    <circle cx="20" cy="30" r="1.5" fill="#1F2937"/>
                </svg>
                <span class="logo-text">Chiro Scot</span>
            </a>
            <nav>
